<!DOCTYPE html>
<html lang="en">
<head>
<script>document.documentElement.dataset.theme=localStorage.getItem("audit-theme")||(matchMedia("(prefers-color-scheme:light)").matches?"light":"dark")</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-Solid Audit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  corePlugins: { preflight: false },
  theme: {
    extend: {
      fontFamily: {
        ui: ['var(--font-ui)'],
        mono: ['var(--font-mono)'],
      },
      colors: {
        accent: 'var(--accent)',
        'accent-hover': 'var(--accent-hover)',
      },
    },
  },
};
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>mermaid.initialize({startOnLoad:false,theme:"dark",securityLevel:"loose"});</script>
<script type="module" src="/js/app.mjs"></script>
</head>
<body>
  <a href="#app" class="skip-link">Skip to content</a>
  <header class="app-header no-print">
    <a href="#/home" class="app-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      audit
    </a>
    <div class="app-logo-sep"></div>
    <nav id="breadcrumb" class="breadcrumb" aria-label="Breadcrumb"></nav>
    <div class="header-spacer"></div>
    <a href="#/settings" class="btn btn-ghost btn-sm" aria-label="Settings" id="header-settings-btn"></a>
    <button id="theme-toggle" class="btn btn-ghost btn-sm" aria-label="Toggle theme"></button>
  </header>

  <main id="app" class="app-main">
    <!-- Views render here -->
  </main>

  <div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>
  <div id="notes-panel-root"></div>
</body>
</html>
