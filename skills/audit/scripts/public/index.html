<!DOCTYPE html>
<html lang="en">
<head>
<script>document.documentElement.dataset.theme=localStorage.getItem("audit-theme")||(matchMedia("(prefers-color-scheme:light)").matches?"light":"dark")</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-Solid Audit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script type="module" src="/js/app.mjs"></script>
</head>
<body>
  <a href="#app" class="skip-link">Skip to content</a>
  <header class="app-header no-print">
    <a href="#/home" class="app-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span id="active-dot" style="display:none;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:reviewPulse 2s ease-in-out infinite;margin-left:4px;flex-shrink:0;"></span>
      audit
    </a>
    <div class="app-logo-sep"></div>
    <div id="project-switcher" class="project-switcher">
      <button id="project-switcher-btn" class="btn btn-ghost btn-sm" aria-label="Switch project" aria-haspopup="true" aria-expanded="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span id="project-switcher-name">Loading...</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div id="project-switcher-dropdown" class="project-dropdown hidden" role="menu"></div>
    </div>
    <nav id="breadcrumb" class="breadcrumb" aria-label="Breadcrumb"></nav>
    <div class="header-spacer"></div>
    <a href="#/settings" class="btn btn-ghost btn-sm" aria-label="Settings" id="header-settings-btn"></a>
    <button id="theme-toggle" class="btn btn-ghost btn-sm" aria-label="Toggle theme" title="Switch theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </header>

  <main id="app" class="app-main">
    <!-- Views render here -->
  </main>

  <div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>
  <div id="notes-panel-root"></div>
</body>
</html>
