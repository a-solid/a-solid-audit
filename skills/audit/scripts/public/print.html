<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Review Report</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #1a1a2e; background: #fff; line-height: 1.5; font-size: 13px;
  }

  .page { max-width: 780px; margin: 0 auto; padding: 48px 40px; }

  /* ─── Header ─── */
  .report-header {
    margin-bottom: 28px; padding-bottom: 14px;
    border-bottom: 2px solid #1a1a2e;
  }
  .report-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 3px; letter-spacing: -0.3px; color: #1a1a2e; }
  .report-header .meta { color: #64748b; font-size: 12px; }

  /* ─── Sign-off Card (first section after header) ─── */
  .signoff-section {
    margin-bottom: 28px; padding: 14px 16px;
    border: 1px solid #cbd5e1; border-radius: 6px;
    page-break-inside: avoid;
  }
  .signoff-section.signed { border-color: #86efac; border-left: 3px solid #166534; }
  .signoff-section h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #1a1a2e; margin-bottom: 10px; }
  .signoff-row { display: flex; align-items: center; gap: 10px; }
  .signoff-avatar {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid #1a1a2e; color: #1a1a2e;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px;
    flex-shrink: 0; background: none;
  }
  .signoff-avatar.unsigned { border-color: #94a3b8; color: #94a3b8; }
  .signoff-body { min-width: 0; }
  .signoff-name { font-size: 14px; font-weight: 600; color: #1a1a2e; }
  .signoff-detail { font-size: 11px; color: #64748b; margin-top: 1px; }
  .signoff-notes { color: #1a1a2e; font-size: 12px; line-height: 1.6; margin-bottom: 10px; white-space: pre-wrap; }

  /* ─── Stats ─── */
  .stats-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .stat-box {
    flex: 1; text-align: center; padding: 10px 6px;
    border: 1px solid #e2e8f0; border-radius: 6px;
  }
  .stat-value { font-size: 22px; font-weight: 700; line-height: 1.2; color: #1a1a2e; }
  .stat-label { font-size: 10px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }

  /* ─── Severity Bars ─── */
  .severity-section { margin-bottom: 24px; }
  .severity-section h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #1a1a2e; margin-bottom: 10px; }
  .sev-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .sev-label {
    font-size: 10px; font-weight: 700; min-width: 60px; text-align: center;
    padding: 2px 6px; border-radius: 3px; letter-spacing: 0.3px;
    background: #f1f5f9; color: #1a1a2e;
    border-left: 3px solid #94a3b8;
  }
  .sev-label.sev-critical { border-left-color: #b91c1c; color: #991b1b; }
  .sev-label.sev-major, .sev-label.sev-high { border-left-color: #dc2626; color: #991b1b; }
  .sev-label.sev-medium, .sev-label.sev-minor { border-left-color: #a16207; color: #92400e; }
  .sev-label.sev-low, .sev-label.sev-info { border-left-color: #1d4ed8; color: #1e40af; }
  .sev-track { flex: 1; height: 8px; background: #f1f5f9; border-radius: 2px; overflow: hidden; }
  .sev-fill { height: 100%; border-radius: 2px; background: #94a3b8; }
  .sev-fill.sev-critical { background: #b91c1c; }
  .sev-fill.sev-major, .sev-fill.sev-high { background: #dc2626; }
  .sev-fill.sev-medium, .sev-fill.sev-minor { background: #a16207; }
  .sev-fill.sev-low, .sev-fill.sev-info { background: #1d4ed8; }
  .sev-count { font-size: 12px; font-weight: 600; min-width: 16px; text-align: right; color: #1a1a2e; }

  /* ─── Task Cards ─── */
  .section-heading { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #1a1a2e; margin-bottom: 12px; margin-top: 8px; }
  .task-card {
    border: 1px solid #e2e8f0; border-radius: 6px; padding: 14px 16px;
    margin-bottom: 12px; page-break-inside: avoid;
  }
  .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .task-name { font-size: 14px; font-weight: 600; color: #1a1a2e; }
  .task-score { font-size: 16px; font-weight: 700; color: #1a1a2e; }

  /* Findings */
  .findings-header { font-size: 10px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .finding {
    border-left: 3px solid #cbd5e1; padding: 6px 10px; margin-bottom: 6px;
    border-radius: 0 4px 4px 0;
  }
  .finding.critical, .finding.major, .finding.high { border-left-color: #b91c1c; }
  .finding.medium, .finding.minor { border-left-color: #a16207; }
  .finding.low, .finding.info { border-left-color: #1d4ed8; }

  .finding-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; flex-wrap: wrap; }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 3px; line-height: 1.5;
    background: #f1f5f9; color: #1a1a2e;
  }
  .badge-sev { background: #f1f5f9; color: #1a1a2e; }
  .badge-status { font-size: 10px; background: none; padding: 0; }
  .badge-confirmed { color: #166534; }
  .badge-dismissed { color: #92400e; }
  .badge-unreviewed { color: #64748b; }

  .finding-desc { font-size: 12px; color: #1a1a2e; line-height: 1.45; }
  .finding-suggestion { font-size: 11px; color: #1a1a2e; margin-top: 3px; }
  .finding-file { font-size: 10px; color: #64748b; margin-top: 3px; }

  /* Loading */
  .loading { text-align: center; padding: 60px 0; color: #888; font-size: 14px; }
  .error { text-align: center; padding: 40px 0; color: #991b1b; }

  /* ─── Print ─── */
  @media print {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    .sev-label {
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
      background: #f1f5f9 !important;
    }
    .loading, .error { display: none; }
    .page { padding: 0; max-width: none; }
    body { font-size: 11px; }
    .report-header { margin-bottom: 20px; }
    .signoff-section { margin-bottom: 20px; }
    .task-card { padding: 10px 12px; margin-bottom: 8px; }
    .finding { padding: 4px 8px; margin-bottom: 4px; }
  }
</style>
</head>
<body>
<div id="app"><div class="loading">Loading report...</div></div>

<script>
const SEVERITY_ORDER = ["critical", "major", "high", "medium", "minor", "low", "info"];

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

async function init() {
  const params = new URLSearchParams(location.search);
  const sessionId = params.get("session");
  const app = document.getElementById("app");

  if (!sessionId) {
    app.innerHTML = '<div class="error">Missing session ID. Use ?session=...</div>';
    return;
  }

  let session, tasks, notes;
  try {
    const sessionRes = await fetch(`/api/sessions/${sessionId}`);
    if (!sessionRes.ok) {
      app.innerHTML = `<div class="error">Session not found. ${esc(sessionId)} does not exist.</div>`;
      return;
    }
    session = await sessionRes.json();
    if (session.status !== "completed" && session.status !== "reviewing") {
      app.innerHTML = `<div class="error">Session is not ready for export (status: ${esc(session.status)}). Complete the review first.</div>`;
      return;
    }
    const [t, n] = await Promise.all([
      fetch(`/api/sessions/${sessionId}/tasks`).then(r => r.json()),
      fetch(`/api/sessions/${sessionId}/notes`).then(r => r.json()),
    ]);
    tasks = t;
    notes = n;
  } catch (e) {
    app.innerHTML = `<div class="error">Failed to load data: ${esc(e.message)}</div>`;
    return;
  }

  // Compute stats
  const totalFindings = tasks.reduce((sum, t) => sum + (t.review?.findings?.length || 0), 0);
  const bySeverity = {};
  tasks.forEach(t => {
    (t.review?.findings || []).forEach(f => {
      bySeverity[f.severity] = (bySeverity[f.severity] || 0) + 1;
    });
  });

  const noteTasks = notes?.tasks || [];
  let confirmed = 0, actionRequired = 0, deferred = 0;
  noteTasks.forEach(t => {
    (t.findings || []).forEach(f => {
      if (f.status === "confirmed") confirmed++;
      else if (f.status === "deferred") deferred++;
    });
  });
  tasks.forEach(t => {
    const noteTask = noteTasks.find(nt => nt.file === t.file);
    const taskFindings = t.review?.findings || [];
    const noteFindings = noteTask?.findings || [];
    taskFindings.forEach((f, i) => {
      const noteF = noteFindings[i];
      if (noteF?.status === "confirmed" && (f.severity === "critical" || f.severity === "major" || f.severity === "high")) {
        actionRequired++;
      }
    });
  });
  const unreviewed = totalFindings - confirmed - deferred;

  const maxSevCount = Math.max(...Object.values(bySeverity), 1);
  const signoff = notes?.summary?.signoff;
  const summaryNotes = notes?.summary?.notes || "";

  app.innerHTML = `
<div class="page">
  <div class="report-header">
    <h1>A-Solid Audit &mdash; Code Review Report</h1>
    <div class="meta">Session: ${esc(session?.id || sessionId)} &middot; Generated: ${new Date().toLocaleDateString()}</div>
  </div>

  <!-- Sign-off section FIRST -->
  <div class="signoff-section${signoff?.date ? " signed" : ""}">
    <h2>Review Sign-off</h2>
    ${summaryNotes ? `<div class="signoff-notes">${esc(summaryNotes)}</div>` : ""}
    ${signoff?.date ? `
      <div class="signoff-row">
        <div class="signoff-avatar">&#10003;</div>
        <div class="signoff-body">
          <div class="signoff-name">${esc(signoff.name || "unknown")}${signoff.role ? " &middot; " + esc(signoff.role) : ""}</div>
          <div class="signoff-detail">${new Date(signoff.date).toLocaleDateString()}</div>
        </div>
      </div>
    ` : `
      <div class="signoff-row">
        <div class="signoff-avatar unsigned">?</div>
        <div class="signoff-body">
          <div class="signoff-name">Not signed off</div>
        </div>
      </div>
    `}
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="stat-value">${totalFindings}</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-value">${confirmed}</div><div class="stat-label">Confirmed</div></div>
    <div class="stat-box"><div class="stat-value">${actionRequired}</div><div class="stat-label">Action Req.</div></div>
    <div class="stat-box"><div class="stat-value">${deferred}</div><div class="stat-label">Deferred</div></div>
    <div class="stat-box"><div class="stat-value">${unreviewed}</div><div class="stat-label">Unreviewed</div></div>
  </div>

  ${Object.keys(bySeverity).length > 0 ? `
  <div class="severity-section">
    <h2>Findings by Severity</h2>
    ${Object.entries(bySeverity).map(([sev, count]) => `
      <div class="sev-row">
        <span class="sev-label sev-${sev}">${sev}</span>
        <div class="sev-track"><div class="sev-fill sev-${sev}" style="width:${(count / maxSevCount) * 100}%"></div></div>
        <span class="sev-count">${count}</span>
      </div>
    `).join("")}
  </div>` : ""}

  <!-- Task details -->
  <div class="section-heading">Task Details</div>
  ${tasks.map(t => {
    const score = t.review?.score;
    const rawFindings = t.review?.findings || [];
    const findings = rawFindings
      .map((f, origIdx) => ({ ...f, _origIdx: origIdx }))
      .sort((a, b) => (SEVERITY_ORDER.indexOf(a.severity) ?? 99) - (SEVERITY_ORDER.indexOf(b.severity) ?? 99));
    const noteTask = noteTasks.find(nt => nt.file === t.file);

    return `
    <div class="task-card">
      <div class="task-header">
        <span class="task-name">${esc(t.name || t.file)}</span>
        <span class="task-score">${score ?? "-"}/10</span>
      </div>
      ${findings.length > 0 ? `
        <div class="findings-header">Findings (${findings.length})</div>
        ${findings.map(f => {
          const origIdx = f._origIdx;
          const status = noteTask?.findings?.[origIdx]?.status || null;
          const isConfirmed = status === "confirmed";
          const isDismissed = status === "deferred";
          const reason = noteTask?.findings?.[origIdx]?.reason || "";
          return `
          <div class="finding ${f.severity}">
            <div class="finding-top">
              <span class="badge">${f.severity}</span>
              ${isConfirmed ? '<span class="badge badge-status badge-confirmed">Confirmed</span>' : ""}
              ${isDismissed ? `<span class="badge badge-status badge-dismissed">Dismissed${reason ? ": " + esc(reason) : ""}</span>` : ""}
              ${!isConfirmed && !isDismissed ? '<span class="badge badge-status badge-unreviewed">Unreviewed</span>' : ""}
            </div>
            <div class="finding-desc">${esc(f.description || "")}</div>
            ${f.suggestion ? `<div class="finding-suggestion">Suggestion: ${esc(f.suggestion)}</div>` : ""}
            ${f.file ? `<div class="finding-file">${esc(f.file)}${f.line ? ":" + f.line : ""}</div>` : ""}
          </div>`;
        }).join("")}
      ` : ""}

    </div>`;
  }).join("")}
</div>`;

  setTimeout(() => window.print(), 300);
}

init();
</script>
</body>
</html>
